name: Update Analytics Bundles

# Mise à jour automatique toutes les 2 heures, décalée de 30 min après le
# backfill afin de reconstruire les bundles sur des données fraîches.
# Ajuster/désactiver le cron si besoin. Déclenchement manuel toujours possible.

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-analytics
  cancel-in-progress: false

jobs:
  update-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build analytics bundles for all provinces
        run: npm run build:analytics
        env:
          ODK_TOKEN: ${{ secrets.ODK_TOKEN }}
          ODK_HOUSEHOLDS_FORM_URL: ${{ secrets.ODK_HOUSEHOLDS_FORM_URL || 'https://api.whonghub.org/api/v1/data/4498.json' }}
          ODK_OUTSIDE_FORM_URL: ${{ secrets.ODK_OUTSIDE_FORM_URL || 'https://api.whonghub.org/api/v1/data/4499.json' }}
          CAMPAIGN_START_DATE: "2026-05-23"
          MONITORING_END_DATE: "2026-06-10"

      - name: Commit and push analytics bundles if changed
        run: |
          set -e
          if git diff --quiet -- data/analytics/ && [ -z "$(git ls-files --others --exclude-standard data/analytics/)" ]; then
            echo "No analytics changes to commit"
            exit 0
          fi

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/analytics/
          git commit -m "data: mise à jour bundles analytics [skip ci]"

          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              echo "Push réussi (tentative $attempt)"
              exit 0
            fi
            if [ "$attempt" -eq 4 ]; then
              echo "Push échoué après 4 tentatives — abandon"
              exit 1
            fi
            wait_s=$((2 ** (attempt - 1) * 2))
            echo "Push refusé (main a avancé) — pull --rebase + retry dans ${wait_s}s"
            git fetch origin main
            git rebase origin/main
            sleep "$wait_s"
          done
