name: CI

# Désactivé pour éviter de consommer les minutes GitHub Actions.
# Exécution uniquement manuelle depuis l’onglet Actions.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
